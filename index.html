<!DOCTYPE html>
<html>
<head>
  <title>AI Push-Up Auto Counter</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
    }
    video, canvas {
      width: 90%;
      max-width: 500px;
      border-radius: 15px;
      margin-top: 15px;
    }
    h1 { margin-top: 15px; }
  </style>
</head>
<body>

<h1>💪 AI Push-Up Auto Counter</h1>
<h2>Push-Ups: <span id="counter">0</span></h2>
<h3>Aura Points: <span id="points">0</span></h3>

<video id="video" playsinline></video>
<canvas id="canvas"></canvas>

<script>
const video = document.getElementById('video');
const canvasElement = document.getElementById('canvas');
const canvasCtx = canvasElement.getContext('2d');

let count = 0;
let stage = "up";

function calculateAngle(a, b, c) {
  const radians =
    Math.atan2(c.y - b.y, c.x - b.x) -
    Math.atan2(a.y - b.y, a.x - b.x);
  let angle = Math.abs(radians * 180.0 / Math.PI);
  if (angle > 180.0) angle = 360 - angle;
  return angle;
}

const pose = new Pose({
  locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
  }
});

pose.setOptions({
  modelComplexity: 1,
  smoothLandmarks: true,
  enableSegmentation: false,
  minDetectionConfidence: 0.5,
  minTrackingConfidence: 0.5
});

pose.onResults(results => {
  canvasElement.width = video.videoWidth;
  canvasElement.height = video.videoHeight;

  canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
  canvasCtx.drawImage(results.image, 0, 0,
    canvasElement.width, canvasElement.height);

  if (results.poseLandmarks) {

    const shoulder = results.poseLandmarks[11];
    const elbow = results.poseLandmarks[13];
    const wrist = results.poseLandmarks[15];

    const angle = calculateAngle(shoulder, elbow, wrist);

    if (angle > 160) {
      stage = "up";
    }

    if (angle < 90 && stage === "up") {
      stage = "down";
      count++;
      document.getElementById("counter").innerText = count;
      document.getElementById("points").innerText = count * 10;
    }
  }
});

const camera = new Camera(video, {
  onFrame: async () => {
    await pose.send({image: video});
  },
  width: 640,
  height: 480
});

camera.start();
</script>

</body>
</html>
